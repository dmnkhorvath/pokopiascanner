services:
  pokopia-scanner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ADSENSE_CLIENT: ${VITE_ADSENSE_CLIENT}
        VITE_AD_SLOT_LANDING_TOP: ${VITE_AD_SLOT_LANDING_TOP}
        VITE_AD_SLOT_LANDING_BOTTOM: ${VITE_AD_SLOT_LANDING_BOTTOM}
        VITE_AD_SLOT_SCANNER_TOP: ${VITE_AD_SLOT_SCANNER_TOP}
        VITE_AD_SLOT_SCANNER_BOTTOM: ${VITE_AD_SLOT_SCANNER_BOTTOM}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID}
    ports:
      - "3000:80"
    env_file:
      - .env
    restart: unless-stopped
