name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_AD_SLOT_LANDING_TOP: ${{ secrets.VITE_AD_SLOT_LANDING_TOP }}
          VITE_AD_SLOT_LANDING_BOTTOM: ${{ secrets.VITE_AD_SLOT_LANDING_BOTTOM }}
          VITE_AD_SLOT_SCANNER_TOP: ${{ secrets.VITE_AD_SLOT_SCANNER_TOP }}
          VITE_AD_SLOT_SCANNER_BOTTOM: ${{ secrets.VITE_AD_SLOT_SCANNER_BOTTOM }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
