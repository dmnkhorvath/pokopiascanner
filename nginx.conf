server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # --- ads.txt / robots.txt: moderate cache, revalidate daily ---
    location = /ads.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }

    # --- Hashed static assets: cache forever (Vite content-hashes the filenames) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # --- Favicon: cache 1 day ---
    location = /favicon.svg {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- index.html: never cache so new deploys are picked up immediately ---
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    location = /index.html {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # --- SPA fallback: serve index.html for client-side routes ---
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
