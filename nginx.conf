server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (global)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Enable gzip for text-based assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # --- ads.txt / robots.txt: moderate cache, revalidate daily ---
    location = /ads.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }

    # --- Hashed static assets: cache forever (Vite content-hashes the filenames) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Icon images: cache long (filenames are stable, content doesn't change) ---
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # --- Favicon: cache 1 day ---
    location = /favicon.svg {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- index.html: never cache so new deploys are picked up immediately ---
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    location = /index.html {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # --- SPA fallback: serve index.html for client-side routes ---
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
