<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97C20"/>
      <stop offset="100%" style="stop-color:#B5651D"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Scanner/magnifying glass -->
  <circle cx="220" cy="220" r="120" fill="none" stroke="#fff" stroke-width="32"/>
  <line x1="310" y1="310" x2="420" y2="420" stroke="#fff" stroke-width="36" stroke-linecap="round"/>
  <!-- Pokeball detail inside lens -->
  <line x1="100" y1="220" x2="340" y2="220" stroke="#fff" stroke-width="12"/>
  <circle cx="220" cy="220" r="28" fill="#fff"/>
  <circle cx="220" cy="220" r="16" fill="#D97C20"/>
</svg>
