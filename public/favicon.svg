<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D97C20"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass circle -->
  <circle cx="20" cy="20" r="14" fill="none" stroke="url(#g)" stroke-width="4"/>
  <!-- Glass fill -->
  <circle cx="20" cy="20" r="12" fill="#fff8f3" opacity="0.6"/>
  <!-- Handle -->
  <line x1="30" y1="30" x2="44" y2="44" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <!-- Pokeball hint inside glass -->
  <circle cx="20" cy="20" r="5" fill="none" stroke="#5BBF55" stroke-width="1.5"/>
  <line x1="12" y1="20" x2="28" y2="20" stroke="#5BBF55" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="2" fill="#D97C20"/>
</svg>
